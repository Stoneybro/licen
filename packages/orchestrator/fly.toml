app = "licen-orchestrator"
primary_region = "lhr"  # London — change to nearest: iad (US East), sin (Singapore), etc.

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false   # keep it always-on — critical for a background poller
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"   # free tier machine size
  memory = "256mb"
